<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — ContainerGen</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050a;--surface:#080d18;--border:#0f1a2e;--border2:#1a2e4a;
  --text:#e8edf5;--muted:#4a5568;--accent:#0ea5e9;--accent2:#0284c7;
  --green:#22c55e;--sans:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:2rem}

/* Background */
.bg-grid{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(14,165,233,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(14,165,233,.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none}
.bg-glow{position:fixed;top:-20vh;left:50%;transform:translateX(-50%);
  width:60vw;height:50vh;
  background:radial-gradient(ellipse,rgba(14,165,233,.06) 0%,transparent 70%);
  pointer-events:none;z-index:0}

.login-wrap{position:relative;z-index:1;width:100%;max-width:420px}

/* Logo */
.login-logo{font-family:var(--mono);font-size:20px;font-weight:600;
  text-align:center;margin-bottom:.4rem;text-decoration:none;color:var(--text);display:block}
.login-logo span{color:var(--accent)}
.login-tagline{font-size:13px;color:var(--muted);text-align:center;
  margin-bottom:2rem;line-height:1.5}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:2.5rem}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:9px;
  padding:3px;margin-bottom:1.75rem}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);
  cursor:pointer;border-radius:7px;font-family:var(--sans);font-size:13px;
  font-weight:600;transition:.12s}
.tab.active{background:#0e1a2e;color:var(--text)}

/* Fields */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.field input{width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:8px;padding:11px 13px;font-size:14px;font-family:var(--sans);
  color:var(--text);outline:none;transition:.12s}
.field input:focus{border-color:var(--accent)}

/* Submit */
.submit-btn{width:100%;padding:12px;background:var(--accent);border:none;
  border-radius:9px;color:white;font-family:var(--sans);font-size:14px;
  font-weight:700;cursor:pointer;transition:.15s;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{background:var(--accent2)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}

/* Message */
.msg{font-size:12px;text-align:center;margin-top:12px;padding:10px;
  border-radius:7px;min-height:16px;display:none}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  color:#f87171;display:block}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);
  color:var(--green);display:block}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:1.25rem 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Back link */
.back-link{display:block;text-align:center;margin-top:1.25rem;font-size:13px;
  color:var(--muted);text-decoration:none;transition:color .12s}
.back-link:hover{color:var(--text)}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.25);
  border-top-color:white;border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Success screen */
.success-screen{display:none;text-align:center;padding:2rem 0}
.success-icon{font-size:3rem;margin-bottom:1rem}
.success-title{font-size:20px;font-weight:700;margin-bottom:.5rem}
.success-sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.success-btn{display:inline-block;background:var(--accent);color:white;
  padding:11px 24px;border-radius:8px;font-size:14px;font-weight:700;
  text-decoration:none;transition:.15s}
.success-btn:hover{background:var(--accent2)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-wrap">
  <a class="login-logo" href="index.html">container<span>gen</span></a>
  <p class="login-tagline">Docker Configs in Sekunden generieren</p>

  <div class="card">
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="switchMode('login',this)">Einloggen</button>
      <button class="tab" onclick="switchMode('register',this)">Registrieren</button>
    </div>

    <!-- Login/Register Form -->
    <div id="form-screen">
      <div class="field">
        <label>E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Passwort</label>
        <input type="password" id="password" placeholder="••••••••"
          autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
      </div>
      <button class="submit-btn" id="submit-btn" onclick="doAuth()">
        <span id="btn-icon"></span>
        <span id="btn-text">Einloggen</span>
      </button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- Success (nach Registrierung) -->
    <div class="success-screen" id="success-screen">
      <div class="success-icon">📬</div>
      <div class="success-title">Fast fertig!</div>
      <p class="success-sub">Wir haben dir eine Bestätigungs-E-Mail geschickt.<br>Bitte bestätige deine E-Mail und logge dich dann ein.</p>
      <button class="submit-btn" onclick="showLoginMode()" style="width:auto;padding:10px 24px">Zum Login →</button>
    </div>
  </div>

  <a href="index.html" class="back-link">← Zurück zur Startseite</a>
</div>

<script>
// ══════════════════════════════════════════
// HIER DEINE SUPABASE KEYS EINTRAGEN
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://bsjaqlxzhdrmskzglyot.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzamFxbHh6aGRybXNremdseW90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTkyMTIsImV4cCI6MjA5MTU5NTIxMn0.3A2NOeLWq5k1lP-0uB7MCpLIGvrqXYLa_0c3xhNwFV4';
// ══════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let mode = 'login';

// Wenn bereits eingeloggt → direkt zur App
;(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'app.html';
})();

function switchMode(m, btn) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('btn-text').textContent = m === 'login' ? 'Einloggen' : 'Registrieren';
  document.getElementById('msg').className = 'msg';
  document.getElementById('msg').textContent = '';
  document.getElementById('form-screen').style.display = '';
  document.getElementById('success-screen').style.display = 'none';
}

function showLoginMode() {
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('form-screen').style.display = '';
  mode = 'login';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.getElementById('btn-text').textContent = 'Einloggen';
}

async function doAuth() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');
  const msg      = document.getElementById('msg');

  // Validierung
  if (!email || !email.includes('@')) { showMsg('Bitte gültige E-Mail eingeben.', 'err'); return; }
  if (password.length < 6) { showMsg('Passwort mindestens 6 Zeichen.', 'err'); return; }

  btn.disabled = true;
  document.getElementById('btn-icon').innerHTML = '<span class="spin"></span>';
  document.getElementById('btn-text').textContent = 'Bitte warten...';

  try {
    if (mode === 'login') {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      // Eingeloggt → zur App
      window.location.href = 'app.html';

    } else {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      // Registrierung erfolgreich → Bestätigungs-Screen zeigen
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
    }
  } catch(e) {
    showMsg(translateErr(e.message), 'err');
  } finally {
    btn.disabled = false;
    document.getElementById('btn-icon').innerHTML = '';
    document.getElementById('btn-text').textContent = mode === 'login' ? 'Einloggen' : 'Registrieren';
  }
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}

function translateErr(msg) {
  if (msg.includes('Invalid login credentials')) return 'Falsche E-Mail oder Passwort.';
  if (msg.includes('Email not confirmed'))       return 'E-Mail noch nicht bestätigt. Bitte E-Mail prüfen.';
  if (msg.includes('User already registered'))   return 'Diese E-Mail ist bereits registriert. Bitte einloggen.';
  if (msg.includes('Password should be'))        return 'Passwort zu schwach. Mindestens 6 Zeichen.';
  return msg;
}
</script>
</body>
</html>
