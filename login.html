<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — ContainerGen</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03050a;--surface:#080d18;--border:#0f1a2e;--border2:#1a2e4a;--text:#e8edf5;--muted:#4a5568;--accent:#0ea5e9;--accent2:#0284c7;--green:#22c55e;--sans:'Sora',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(14,165,233,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.bg-glow{position:fixed;top:-20vh;left:50%;transform:translateX(-50%);width:60vw;height:50vh;background:radial-gradient(ellipse,rgba(14,165,233,.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:400px}
.logo{font-family:var(--mono);font-size:20px;font-weight:600;text-align:center;margin-bottom:.3rem;text-decoration:none;color:var(--text);display:block}
.logo span{color:var(--accent)}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:1.75rem}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:600;transition:.12s}
.tab.active{background:#0e1a2e;color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.field input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:14px;font-family:var(--sans);color:var(--text);outline:none;transition:.12s}
.field input:focus{border-color:var(--accent)}
.submit{width:100%;padding:12px;background:var(--accent);border:none;border-radius:9px;color:white;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.submit:hover{background:var(--accent2)}
.submit:disabled{opacity:.4;cursor:not-allowed}
.msg{font-size:12px;text-align:center;margin-top:12px;padding:10px;border-radius:7px;display:none}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;display:block}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green);display:block}
.back{display:block;text-align:center;margin-top:1.25rem;font-size:13px;color:var(--muted);text-decoration:none;transition:color .12s}
.back:hover{color:var(--text)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:white;border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="wrap">
  <a class="logo" href="index.html">container<span>gen</span></a>
  <p class="sub">Docker Configs in Sekunden generieren</p>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login',this)">Einloggen</button>
      <button class="tab" onclick="switchTab('register',this)">Registrieren</button>
    </div>
    <div class="field"><label>E-Mail</label><input type="email" id="email" placeholder="deine@email.com" autocomplete="email"></div>
    <div class="field"><label>Passwort</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"></div>
    <button class="submit" id="submit-btn" onclick="doAuth()">
      <span id="btn-icon"></span><span id="btn-text">Einloggen</span>
    </button>
    <div class="msg" id="msg"></div>
  </div>
  <a href="index.html" class="back">← Zurück zur Startseite</a>
</div>

<script>
// ══════════════════════════════════════
// SUPABASE KEYS — NUR HIER EINTRAGEN
// ══════════════════════════════════════
const SUPABASE_URL  = 'https://bsjaqlxzhdrmskzglyot.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzamFxbHh6aGRybXNremdseW90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTkyMTIsImV4cCI6MjA5MTU5NTIxMn0.3A2NOeLWq5k1lP-0uB7MCpLIGvrqXYLa_0c3xhNwFV4';
// ══════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let mode = 'login';

// Bereits eingeloggt? → direkt zur App
;(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session) window.location.href = 'app.html';
})();

function switchTab(m, btn) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('btn-text').textContent = m==='login' ? 'Einloggen' : 'Registrieren';
  document.getElementById('msg').className = 'msg';
}

async function doAuth() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');

  if(!email||!email.includes('@')){showMsg('Bitte gültige E-Mail eingeben.','err');return;}
  if(password.length<6){showMsg('Passwort mindestens 6 Zeichen.','err');return;}

  btn.disabled=true;
  document.getElementById('btn-icon').innerHTML='<span class="spin"></span>';
  document.getElementById('btn-text').textContent='...';

  try {
    if(mode==='login'){
      const {error} = await sb.auth.signInWithPassword({email,password});
      if(error) throw error;
      // ✅ Eingeloggt → zur App weiterleiten
      window.location.href = 'app.html';
    } else {
      const {error} = await sb.auth.signUp({email,password});
      if(error) throw error;
      showMsg('Registriert! Bitte E-Mail bestätigen, dann einloggen.','ok');
      mode='login';
      document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
      document.getElementById('btn-text').textContent='Einloggen';
    }
  } catch(e){
    showMsg(translateErr(e.message),'err');
  } finally {
    btn.disabled=false;
    document.getElementById('btn-icon').innerHTML='';
    if(document.getElementById('btn-text').textContent==='...'){
      document.getElementById('btn-text').textContent = mode==='login'?'Einloggen':'Registrieren';
    }
  }
}

function showMsg(text,type){const m=document.getElementById('msg');m.textContent=text;m.className='msg '+type;}
function translateErr(msg){
  if(msg.includes('Invalid login credentials')) return 'Falsche E-Mail oder Passwort.';
  if(msg.includes('Email not confirmed'))       return 'E-Mail noch nicht bestätigt.';
  if(msg.includes('User already registered'))   return 'E-Mail bereits registriert. Bitte einloggen.';
  return msg;
}
</script>
</body>
</html>
